name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - name: Restore dependencies
        run: dotnet restore src/VendingManager.slnx
      - name: Build
        run: dotnet build src/VendingManager.slnx --no-restore --configuration Release

  test:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - name: Restore dependencies
        run: dotnet restore src/VendingManager.slnx
      - name: Build
        run: dotnet build src/VendingManager.slnx --no-restore --configuration Release
      - name: Test
        run: dotnet test src/VendingManager.Tests/VendingManager.Tests.csproj --no-build --verbosity normal --configuration Release