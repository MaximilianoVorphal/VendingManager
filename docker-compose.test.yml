# Entorno de prueba aislado para testing de cambios sin afectar dev ni prod.
# Usa el mismo .env compartido.

volumes:
  mssql_data_test:
  scraper_data_test:


services:
  webapp-test:
    image: vendingmanager-test
    build:
      context: ./src
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8082:8080"
    environment:
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__DefaultConnection=Server=db-test;Database=VendingDB_Test;User Id=sa;Password=${MSSQL_SA_PASSWORD};TrustServerCertificate=True;
      - ASPNETCORE_ENVIRONMENT=Development
      - TZ=America/Santiago
      - ScraperServiceUrl=http://scraper-test:8000
    depends_on:
      db-test:
        condition: service_healthy
      scraper-test:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  db-test:
    image: mcr.microsoft.com/mssql/server:2022-latest
    restart: unless-stopped
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=${MSSQL_SA_PASSWORD}
      - TZ=America/Santiago
    volumes:
      - mssql_data_test:/var/opt/mssql
      - ~/vendingmanager-backups-test:/var/opt/mssql/backup
    ports:
      - "1435:1433"
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$${MSSQL_SA_PASSWORD}\" -C -Q \"SELECT 1\" || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  scraper-test:
    build:
      context: ./services/scraper
      dockerfile: Dockerfile
    restart: unless-stopped
    volumes:
      - scraper_data_test:/app/downloads
    ports:
      - "8002:8000"
    environment:
      - TZ=America/Santiago
      - OURVEND_USER=${OURVEND_USER}
      - OURVEND_PASS=${OURVEND_PASS}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
