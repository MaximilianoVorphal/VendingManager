volumes:
  mssql_data:

  scraper_data:


services:
  webapp:
    image: vendingmanager
    build:
      context: ./src
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8080:8080"

    environment:
      - ConnectionStrings__DefaultConnection=Server=db;Database=VendingDB;User Id=sa;Password=${MSSQL_SA_PASSWORD};TrustServerCertificate=True;
      - ASPNETCORE_ENVIRONMENT=Production
      - TZ=America/Santiago
      # URL del servicio de scraping para que .NET sepa a dónde llamar
      - ScraperServiceUrl=http://scraper:8000
    depends_on:
      db:
        condition: service_healthy
      scraper:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    restart: unless-stopped
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=${MSSQL_SA_PASSWORD}
      - TZ=America/Santiago
    volumes:
      - mssql_data:/var/opt/mssql
      - ~/vendingmanager-backups:/var/opt/mssql/backup
    ports:
      - "127.0.0.1:1433:1433"
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$${MSSQL_SA_PASSWORD}\" -C -Q \"SELECT 1\" || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # Nuevo servicio para el Scraper (Python + Playwright)
  scraper:
    build:
      context: ./services/scraper
      dockerfile: Dockerfile
    restart: unless-stopped
    volumes:
      - scraper_data:/app/downloads
    ports:
      - "8000:8000" # Opcional: solo para pruebas locales, interno no hace falta exponerlo
    environment:
      - TZ=America/Santiago
      - OURVEND_USER=${OURVEND_USER}
      - OURVEND_PASS=${OURVEND_PASS}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
