services:
  webapp:
    image: vendingmanager
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - ConnectionStrings__DefaultConnection=Server=db;Database=VendingDB;User Id=sa;Password=${MSSQL_SA_PASSWORD};TrustServerCertificate=True;
      - ASPNETCORE_ENVIRONMENT=Development
      - TZ=America/Santiago
    depends_on:
      - db

  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=${MSSQL_SA_PASSWORD}
      - TZ=America/Santiago
    volumes:
      - mssql_data:/var/opt/mssql
      - ./backups:/var/opt/mssql/backup # <-- Añade esta línea
    ports:
      - "1433:1433"

volumes:
  mssql_data:
