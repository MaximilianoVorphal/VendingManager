<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VendingManager.Web</title>
    <base href="/" />
    <link rel="preload" id="webassembly" />
    <link rel="stylesheet" href="lib/bootstrap/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="css/app.css" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <link href="VendingManager.Web.styles.css" rel="stylesheet" />
    <script type="importmap"></script>
</head>

<body>
    <div id="app">
        <div
            style="font-family: 'Consolas', monospace; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center;">
            <div class="spinner-border text-dark" role="status" style="width: 3rem; height: 3rem;"></div>
            <div style="margin-top: 20px; font-weight: bold; letter-spacing: 2px;">SYSTEM_INITIALIZING... (VERSION
                CHECK)</div>
        </div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="." class="reload">Reload</a>
        <span class="dismiss">🗙</span>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
        console.log('Initializing ChartJsInterop inline...');
        window.ChartJsInterop = {
            setupChart: (canvasId, config) => {
                console.log(`Setting up chart: ${canvasId}`);
                const ctx = document.getElementById(canvasId).getContext('2d');
                if (window[canvasId + '_chart']) {
                    window[canvasId + '_chart'].destroy();
                }
                window[canvasId + '_chart'] = new Chart(ctx, config);
            }
        };
    </script>
    <script src="_framework/blazor.webassembly.js"></script>
    <script src="js/app.js"></script>
</body>

</html>
