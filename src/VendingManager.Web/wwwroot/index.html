<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, viewport-fit=cover" />
    <title>VendingManager.Web</title>
    <meta name="theme-color" content="#212529">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <base href="/" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,400;0,500;0,700;0,800;1,400&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="preload" id="webassembly" />
    <link rel="stylesheet" href="lib/bootstrap/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="css/app.css" />
    <link rel="stylesheet" href="css/vendingmanager.css" />
    <link rel="stylesheet" href="css/vm-mobile.css" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <link href="VendingManager.Web.styles.css" rel="stylesheet" />
    <script type="importmap"></script>
</head>

<body>
    <div id="app">
        <div
            style="font-family: 'Consolas', monospace; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center;">
            <div class="spinner-border text-dark" role="status" style="width: 3rem; height: 3rem;"></div>
            <div style="margin-top: 20px; font-weight: bold; letter-spacing: 2px;">SYSTEM_INITIALIZING... (VERSION
                CHECK)</div>
        </div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="." class="reload">Reload</a>
        <span class="dismiss">🗙</span>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/chart.js" defer></script>
    <script src="js/ChartJsInterop.js?v=2.0" defer></script>
    <script src="_framework/blazor.webassembly.js"></script>
    <script src="js/modal-scroll-lock.js"></script>
    <script src="js/app.js" defer></script>
    <script>
        window.descargarArchivo = async (url, nombre) => {
            try {
                const response = await fetch(url);
                if (!response.ok) throw new Error('Network response was not ok');
                const blob = await response.blob();
                const urlBlob = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.style.display = 'none';
                a.href = urlBlob;
                a.download = nombre;
                document.body.appendChild(a);
                a.click();
                window.URL.revokeObjectURL(urlBlob);
                document.body.removeChild(a);
            } catch (error) {
                console.error('Error downloading file:', error);
                alert('Error al descargar el archivo: ' + error.message);
            }
        }

        /**
         * Create a blob URL from a base64 string and content type.
         * Used by MobileMachinePhotoSheet to avoid storing full data URLs in the DOM.
         * @param {string} base64 - Raw base64-encoded file bytes.
         * @param {string} contentType - MIME type (e.g. "image/jpeg").
         * @returns {string} A blob:// URL that can be used as an <img> src.
         */
        window.vmCreateBlobUrl = (base64, contentType) => {
            const byteCharacters = atob(base64);
            const byteNumbers = new Uint8Array(byteCharacters.length);
            for (let i = 0; i < byteCharacters.length; i++) {
                byteNumbers[i] = byteCharacters.charCodeAt(i);
            }
            const blob = new Blob([byteNumbers], { type: contentType });
            return URL.createObjectURL(blob);
        };

        /**
         * Revoke a blob URL created by vmCreateBlobUrl to free memory.
         * @param {string} url - The blob: URL to revoke.
         */
        window.vmRevokeBlobUrl = (url) => {
            URL.revokeObjectURL(url);
        };

        window.downloadFromBase64 = (base64, filename) => {
            var a = document.createElement("a");
            document.body.appendChild(a);
            a.style = "display: none";
            var byteCharacters = atob(base64);
            var byteNumbers = new Array(byteCharacters.length);
            for (var i = 0; i < byteCharacters.length; i++) {
                byteNumbers[i] = byteCharacters.charCodeAt(i);
            }
            var byteArray = new Uint8Array(byteNumbers);
            var blob = new Blob([byteArray], { type: "application/vnd.openxmlformats-officedocument.spreadsheetml.sheet" });
            var url = window.URL.createObjectURL(blob);
            a.href = url;
            a.download = filename;
            a.click();
            window.URL.revokeObjectURL(url);
        };
    </script>
</body>

</html>
